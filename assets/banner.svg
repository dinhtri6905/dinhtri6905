<svg width="1200" height="160" viewBox="0 0 1200 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#0ea5e9;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#0ea5e9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="160" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid pattern -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="200" y1="0" x2="200" y2="160"/>
    <line x1="400" y1="0" x2="400" y2="160"/>
    <line x1="600" y1="0" x2="600" y2="160"/>
    <line x1="800" y1="0" x2="800" y2="160"/>
    <line x1="1000" y1="0" x2="1000" y2="160"/>
  </g>

  <!-- Accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#line)"/>

  <!-- Left bracket -->
  <text x="48" y="95" font-family="JetBrains Mono, Consolas, monospace" font-size="48" fill="#21262d" font-weight="300">&#123;</text>

  <!-- Name -->
  <text x="110" y="75" font-family="JetBrains Mono, Consolas, monospace" font-size="32" fill="#e6edf3" font-weight="600" letter-spacing="-0.5">YOUR_NAME</text>

  <!-- Divider dot -->
  <circle cx="108" cy="99" r="2" fill="#0ea5e9"/>

  <!-- Headline -->
  <text x="118" y="104" font-family="JetBrains Mono, Consolas, monospace" font-size="14" fill="#0ea5e9" letter-spacing="2" font-weight="400">DEVOPS ENGINEER</text>

  <!-- Right bracket -->
  <text x="1140" y="95" font-family="JetBrains Mono, Consolas, monospace" font-size="48" fill="#21262d" font-weight="300">&#125;</text>

  <!-- Right side tags -->
  <text x="860" y="68" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#30363d">// Cloud · Kubernetes · GitOps</text>
  <text x="860" y="90" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#30363d">// IaC · CI/CD · Observability</text>
  <text x="860" y="112" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#30363d">// Ho Chi Minh City, Vietnam 🇻🇳</text>

  <!-- Bottom accent line -->
  <rect x="0" y="158" width="1200" height="2" fill="url(#line)"/>
</svg>
